<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>싱가포르 현지인화 분석기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="theme-toggle-container">
            <button id="theme-toggle" aria-label="테마 변경">🌙</button>
        </div>
        
        <div id="main-container">
            <div id="initial-view">
                <div class="main-icon">🦁🇸🇬</div>
                <h1>싱가포르 현지인화 &<br>남친 결핍 지수 분석</h1>
                <p class="description">원격 센서를 통해 싱가포르에 있는 당신의<br>상태를 정밀 분석합니다.</p>
                
                <div class="input-group">
                    <input type="text" id="user-name" placeholder="이름을 입력하세요" autocomplete="off">
                </div>
                
                <button id="start-btn">정밀 분석 시작</button>
            </div>

            <div id="loading-view" class="hidden">
                <div class="merlion-loader">🦁💦</div>
                <p id="loading-text">싱가포르 습도 적응도 계산 중...</p>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div id="result-view" class="hidden">
                <div class="result-score" id="result-score">88<span>%</span></div>
                <h2 id="result-title">분석 완료</h2>
                <div id="result-content"></div>
                <button id="restart-btn">다시 분석하기</button>
            </div>

            <div id="contact-container">
                <hr>
                <p class="contact-title">제휴 및 문의</p>
                <form action="https://formspree.io/f/mykabnya" method="POST">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                    <textarea name="message" placeholder="문의 내용을 입력하세요" required></textarea>
                    <button type="submit" id="submit-btn">문의 보내기</button>
                </form>
            </div>

            <div id="disqus_container">
                <hr>
                <div id="disqus_thread"></div>
                <script>
                    /**
                    *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                    *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                    /*
                    var disqus_config = function () {
                    this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                    this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                    };
                    */
                    (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://kjb-1.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </div>
        </div>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
