<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엄마를 위한 특별한 선물</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="theme-toggle-container">
            <button id="theme-toggle" aria-label="테마 변경">🌙</button>
        </div>
        
        <div id="gift-container">
            <div id="initial-view">
                <div class="heart-icon">💝</div>
                <h1>엄마만을 위한 서프라이즈</h1>
                <p class="description">세상에서 가장 소중한 우리 엄마를 위해<br>특별한 선물을 준비했어요.</p>
                <button id="open-gift-btn">선물 확인하기</button>
            </div>

            <div id="loading-view" class="hidden">
                <div class="spinner"></div>
                <p id="loading-text">엄마에게 딱 맞는 선물을 고르는 중...</p>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div id="result-view" class="hidden">
                <div class="result-icon" id="result-icon">🎁</div>
                <h2 id="result-title">짜잔!</h2>
                <p id="result-description"></p>
                <button id="restart-btn">하나 더 열어보기</button>
            </div>
        </div>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
