<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="theme-toggle-container">
            <button id="theme-toggle" aria-label="테마 변경">🌙</button>
        </div>
        <h1>AI 로또 당첨 확률 계산기</h1>
        <p class="subtitle">당신의 관상과 성격으로 1등 확률을 정밀 분석합니다.</p>
        
        <div id="input-container">
            <input type="text" id="user-name" placeholder="이름을 입력하세요" autocomplete="off">
        </div>

        <div id="lotto-sets-container">
            <div id="progress-container" class="hidden">
                <div id="progress-bar"></div>
                <p id="status-text">데이터 분석 중...</p>
            </div>
            <div id="result-text" class="hidden"></div>
        </div>

        <button id="generate-btn">확률 분석 시작</button>
        <button id="restart-btn" class="hidden">다시 분석하기</button>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
